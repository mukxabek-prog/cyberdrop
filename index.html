<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBERDROP | Bonuslar va Sovg'alar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Rajdhani:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #0f1215;
            --bg-card: #161a1e;
            --accent-green: #c4ff00;
            --accent-hover: #a3d400;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: #fff;
        }

        .heading-font { font-family: 'Rajdhani', sans-serif; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f1215; }
        ::-webkit-scrollbar-thumb { background: #2c323a; border-radius: 10px; }

        .sidebar-link:hover {
            background: rgba(196, 255, 0, 0.05);
            border-right: 3px solid var(--accent-green);
            color: var(--accent-green);
        }

        .sidebar-link.active {
            background: rgba(196, 255, 0, 0.1);
            border-right: 3px solid var(--accent-green);
            color: var(--accent-green);
        }

        .bonus-card {
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s ease;
        }
        .bonus-card:hover {
            border-color: var(--accent-green);
            transform: translateY(-3px);
        }

        .btn-green {
            background-color: var(--accent-green);
            color: #000;
            font-weight: 800;
            text-transform: uppercase;
            transition: 0.3s;
        }
        .btn-green:hover {
            background-color: var(--accent-hover);
            box-shadow: 0 0 15px rgba(196, 255, 0, 0.4);
        }

        .promo-input {
            background: #1c2127;
            border: 1px solid #2d343c;
            color: white;
        }
        .promo-input:focus {
            border-color: var(--accent-green);
            outline: none;
        }
    </style>
</head>
<body class="flex min-h-screen">

    <!-- SIDEBAR (Yon menyu) -->
    <aside class="w-64 bg-[#12161a] border-r border-white/5 flex flex-col sticky top-0 h-screen hidden lg:flex">

            <!-- NOM O'ZGARTIRILDI -->
            <h1 class="text-2xl font-black heading-font tracking-tighter italic">CYBER<span class="text-[#c4ff00]">DROP</span></h1>
        </div>
        
        <nav class="flex-1 px-4 space-y-2 mt-4">
            <a href="#" class="sidebar-link flex items-center p-3 rounded-lg text-gray-400 transition group active">
                <i class="fa-solid fa-gift mr-3"></i> <span>Bonuslar</span>
            </a>
            <a href="#" class="sidebar-link flex items-center p-3 rounded-lg text-gray-400 transition group">
                <i class="fa-solid fa-box-open mr-3"></i> <span>Keyslar</span>

            <a href="#" class="sidebar-link flex items-center p-3 rounded-lg text-gray-400 transition group">
                <i class="fa-solid fa-bolt mr-3"></i> <span>Upgrades</span>

            <a href="#" class="sidebar-link flex items-center p-3 rounded-lg text-gray-400 transition group">
                <i class="fa-solid fa-shield-halved mr-3"></i> <span>Kontraktlar</span>
            </a>
            <a href="#" class="sidebar-link flex items-center p-3 rounded-lg text-gray-400 transition group">
                <i class="fa-solid fa-trophy mr-3"></i> <span>Top Foydalanuvchilar</span>

        </nav>

        <!-- ONLINE SECTION (ID QO'SHILDI) -->

    </aside>

    <!-- ASOSIY QISM -->

            <div class="flex space-x-6 items-center">
                <div class="flex flex-col">
                    <span class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Balans</span>
                    <span class="text-white font-black text-lg">150,000 UZS</span>
                </div>
                <button class="w-10 h-10 rounded-lg bg-[#c4ff00] text-black flex items-center justify-center font-bold">
                    <i class="fa-solid fa-plus"></i>
                </button>
            </div>

            <div class="flex items-center space-x-4">

                </div>
            </div>
        </header>

        <!-- CONTENT -->
        <div class="p-6 lg:p-12 max-w-6xl mx-auto w-full">
            
            <div class="mb-10 text-center lg:text-left">
                <h2 class="heading-font text-4xl md:text-5xl font-black uppercase italic mb-2">Bonuslar <span class="text-[#c4ff00]">Markazi</span></h2>
                <p class="text-gray-400">Har kuni kiring va bepul sovg'alarga ega bo'ling!</p>
            </div>

            <div class="bonus-card p-6 rounded-3xl mb-10 flex flex-col md:flex-row items-center justify-between gap-6">
                <div class="flex items-center">

                    </div>

                    <button class="btn-green px-8 py-4 rounded-2xl">Faollashtirish</button>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                
                <!-- 1-Bonus -->
                <div class="bonus-card p-8 rounded-[2.5rem] flex flex-col items-center text-center">
                    <div class="relative mb-6">
                        <div class="absolute inset-0 bg-[#c4ff00] blur-3xl opacity-20"></div>
                        <img src="https://bulldrop.uz/_next/static/media/bonus-case.4770e53a.png" class="w-32 relative z-10" alt="Bonus Case">
