<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBERDROP | Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .spin-container { overflow: hidden; position: relative; border-bottom: 4px solid #c4ff00; }
        .items-track { display: flex; transition: transform 8s cubic-bezier(0.17, 0.67, 0.12, 0.99); }
        .item { min-width: 160px; height: 160px; border: 1px solid #333; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #161a1e; margin-right: 10px; }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-[#0f1215] text-white">

    <!-- KEYS OCHISH MODAL/BLOK -->
    <div id="game-zone" class="hidden fixed inset-0 z-[100] bg-black/90 flex items-center justify-center p-10">
        <div class="bg-[#161a1e] p-8 rounded-3xl w-full max-w-4xl border border-white/10 text-center">
            <h2 class="text-2xl font-black mb-6">KEYS AYLANMOQDA...</h2>
            <div class="spin-container mb-8">
                <div id="items-track" class="items-track"></div>
            </div>
            <button onclick="closeGame()" class="bg-red-500 px-6 py-2 rounded-xl font-bold">Chiqish</button>
        </div>
    </div>

    <!-- ASOSIY GRID -->
    <div class="p-10 max-w-6xl mx-auto">
        <h2 class="text-4xl font-black mb-8">ASOSIY KEYSLAR (10 ta)</h2>
        <div id="grid-10" class="grid grid-cols-5 gap-4 mb-12"></div>
        
        <h2 class="text-4xl font-black mb-8">MAXSUS KEYSLAR (2 ta)</h2>
        <div id="grid-2" class="grid grid-cols-2 gap-4"></div>
    </div>

    <script>
        const items = ["AWM", "AK-47", "M4A1", "Karambit", "Knife", "Glock", "USP", "Desert Eagle"];
        const track = document.getElementById('items-track');
        
        // 12 ta keysni render qilish
        function renderKeys() {
            const grid10 = document.getElementById('grid-10');
            const grid2 = document.getElementById('grid-2');
            
            for(let i=1; i<=12; i++) {
                const div = document.createElement('div');
                div.className = "bonus-card p-4 rounded-2xl cursor-pointer border hover:border-[#c4ff00] text-center";
                div.innerHTML = `<img src="https://cdn-icons-png.flaticon.com/512/2972/2972531.png" class="w-20 mx-auto mb-2"> <p>Keys #${i}</p>`;
                div.onclick = () => startSpin();
                if(i <= 10) grid10.appendChild(div);
                else grid2.appendChild(div);
            }
        }

        function startSpin() {
            document.getElementById('game-zone').classList.remove('hidden');
            track.innerHTML = '';
            
            // Ovoz (Spin)
            new Audio('https://actions.google.com/sounds/v1/foley/rattle_squeak.ogg').play();

            for(let i=0; i<60; i++) { // 2x ko'proq item
                const div = document.createElement('div');
                div.className = 'item';
                div.innerHTML = `<span class="text-xs">Skin</span><span class="font-bold">${items[Math.floor(Math.random()*items.length)]}</span>`;
                track.appendChild(div);
            }

            track.style.transform = `translateX(-4000px)`; 

            setTimeout(() => {
                new Audio('https://actions.google.com/sounds/v1/notifications/piece_of_cake.ogg').play();
                alert("Tabriklaymiz! Siz yutdingiz!");
            }, 8000);
        }

        function closeGame() {
            document.getElementById('game-zone').classList.add('hidden');
            track.style.transform = `translateX(0px)`;
        }

        renderKeys();
    </script>
</body>
</html>
