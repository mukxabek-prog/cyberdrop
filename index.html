<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBERDROP | Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f1215; color: white; font-family: sans-serif; }
        .spin-container { overflow: hidden; width: 100%; border-bottom: 2px solid #333; }
        .items-track { display: flex; transition: transform 5s cubic-bezier(0.17, 0.67, 0.12, 0.99); }
        .item { min-width: 150px; height: 100px; border: 1px solid #333; display: flex; align-items: center; justify-content: center; background: #161a1e; margin-right: 10px; font-weight: bold; }
    </style>
</head>
<body class="p-5">

    <div class="fixed top-5 right-5 bg-black p-4 rounded-xl border border-white/20">
        Balans: <span id="balance">150000</span> UZS
    </div>

    <div class="max-w-4xl mx-auto mt-20">
        <h1 class="text-3xl font-black mb-10">KEYS OCHISH</h1>
        
        <div class="bg-[#1c2127] p-10 rounded-3xl">
            <div class="spin-container mb-10">
                <div id="items-track" class="items-track">
                    </div>
            </div>
            <button id="spin-btn" onclick="startSpin()" class="w-full bg-white text-black font-black py-4 rounded-xl hover:bg-gray-300">
                5,000 UZS GA OCHISH
            </button>
        </div>
    </div>

    <script>
        let balance = 150000;
        const track = document.getElementById('items-track');
        const balanceEl = document.getElementById('balance');
        const btn = document.getElementById('spin-btn');

        function startSpin() {
            if (balance < 5000) return alert("Balans yetarli emas!");
            
            // Balansdan yechish
            balance -= 5000;
            balanceEl.innerText = balance;
            btn.disabled = true;

            // Trackni tozalash va skinlar qo'shish
            track.innerHTML = '';
            for(let i=0; i<30; i++) {
                const div = document.createElement('div');
                div.className = 'item';
                div.innerText = 'Item ' + Math.floor(Math.random() * 100);
                track.appendChild(div);
            }

            // Animatsiya
            track.style.transition = "transform 5s cubic-bezier(0.17, 0.67, 0.12, 0.99)";
            track.style.transform = `translateX(-2000px)`;

            setTimeout(() => {
                const win = Math.floor(Math.random() * 20000);
                alert("Siz yutdingiz: " + win + " UZS");
                balance += win;
                balanceEl.innerText = balance;
                
                track.style.transition = "none";
                track.style.transform = `translateX(0px)`;
                btn.disabled = false;
            }, 5500);
        }
    </script>
</body>
</html>
